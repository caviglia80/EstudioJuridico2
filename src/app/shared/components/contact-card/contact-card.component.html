<button type="button" class="contact-card card w-100 text-bg-dark rounded-4 pressButton" (click)="selected.emit()">
    <div class="d-flex align-items-center p-3 gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="contact-icon flex-shrink-0" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6" />
        </svg>
        <span class="contact-name">
            {{ fullName() }}
            @if (phone()) {
            <span class="contact-phone">{{ phone() }}</span>
            }
        </span>
        @if (isLandline()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="ms-auto flex-shrink-0" viewBox="0 0 16 16" aria-hidden="true">
            <path
                d="M1.885.511a1.745 1.745 0 0 1 2.61.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.678.678 0 0 0 .178.643l2.457 2.457a.678.678 0 0 0 .644.178l2.189-.547a1.745 1.745 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.634 18.634 0 0 1-7.01-4.42 18.634 18.634 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z" />
        </svg>
        } @else {
        <ej-whatsapp-icon [size]="20" class="ms-auto flex-shrink-0 wsp-icon" />
        }
    </div>
</button>
