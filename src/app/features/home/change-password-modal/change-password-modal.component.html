<div class="modal-content login-modal">
    <ej-modal-header title="Cambiar contraseña" />

    <div class="login-header">
        <div class="login-icon" aria-hidden="true">
            <img class="login-icon-image" ngSrc="assets/img/private-modal.png" width="480" height="320" alt="" />
        </div>
    </div>

    <form class="login-form" (submit)="$event.preventDefault(); submit()" autocomplete="on" novalidate>
        <input class="login-autofill-username" type="text" name="username" autocomplete="username" [value]="autofillUsername()" tabindex="-1" />

        <div class="login-field">
            <label for="change-password-current">Contraseña actual</label>
            <input #currentPasswordInput id="change-password-current" name="currentPassword" type="password" autocomplete="current-password" required [disabled]="loading() || !!successMessage()" [value]="currentPassword()"
                (input)="currentPassword.set(currentPasswordInput.value)" />
        </div>

        <div class="login-field">
            <label for="change-password-new">Nueva contraseña</label>
            <input #newPasswordInput id="change-password-new" name="newPassword" type="password" autocomplete="new-password" required [disabled]="loading() || !!successMessage()" [value]="newPassword()"
                (input)="newPassword.set(newPasswordInput.value)" />
        </div>

        <div class="login-field">
            <label for="change-password-confirm">Confirmar nueva contraseña</label>
            <input #confirmPasswordInput id="change-password-confirm" name="confirmPassword" type="password" autocomplete="new-password" required [disabled]="loading() || !!successMessage()" [value]="confirmPassword()"
                (input)="confirmPassword.set(confirmPasswordInput.value)" />
        </div>

        @if (error(); as msg) {
        <div class="login-message login-error" role="alert">{{ msg }}</div>
        }

        @if (successMessage(); as msg) {
        <output class="login-message login-success">{{ msg }}</output>
        }

        <button type="submit" class="login-submit" [disabled]="loading() || !!successMessage()">
            @if (loading()) {
            <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
            <span>Actualizando…</span>
            } @else {
            <span>Guardar contraseña</span>
            }
        </button>
    </form>
</div>
